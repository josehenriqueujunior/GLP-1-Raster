<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Rastreador GLP-1</title> 
    <style>
        :root {
            --cor-principal: #2d6a4f;
            --cor-fundo: #f4f9f4;
            --cor-card: #ffffff;
            --cor-texto: #1b4332;
            --cor-perigo: #d90429;
            --cor-alerta: #ffb703;
            --cor-info: #0288d1;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--cor-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h1, h2 {
            text-align: center;
            color: var(--cor-principal);
            margin-top: 10px;
        }

        .meta-container {
            background-color: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c8e6c9;
        }

        .linha-meta {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 12px;
        }

        .meta-bloco {
            flex: 1;
            text-align: center;
        }

        .meta-titulo {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--cor-principal);
        }

        .meta-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .meta-input-group input {
            width: 80px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            padding: 6px;
        }

        /* Painel de Indicadores de Saúde */
        .paineis-saude {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            border-top: 1px dashed #c8e6c9;
            padding-top: 12px;
        }

        .painel-box {
            flex: 1;
            background: #ffffff;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            text-align: center;
            font-size: 13px;
        }

        .painel-val {
            font-size: 16px;
            font-weight: bold;
            margin-top: 4px;
        }

        .grafico-container {
            margin-bottom: 25px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .campo {
            margin-bottom: 15px;
        }

        .linha-dupla {
            display: flex;
            gap: 15px;
        }

        .linha-dupla .campo {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-salvar {
            background-color: var(--cor-principal);
            color: white;
        }

        .btn-backup {
            background-color: #e9ecef;
            color: #495057;
        }

        .historico-lista {
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
        }

        .item-aplicacao {
            background: #f8f9fa;
            padding: 12px;
            border-left: 5px solid var(--cor-principal);
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .botoes-acoes {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .btn-acao {
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            margin-bottom: 0;
            border-radius: 4px;
            color: white;
        }

        .btn-editar {
            background-color: var(--cor-alerta);
            color: #212529;
        }

        .btn-excluir {
            background-color: var(--cor-perigo);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💉 Registro GLP-1</h1>
    
    <div class="meta-container">
        <div class="linha-meta">
            <div class="meta-bloco">
                <div class="meta-titulo">🎯 Meta de Peso</div>
                <div class="meta-input-group">
                    <input type="number" id="meta-peso" step="0.1" placeholder="70.0" onchange="salvarConfiguracoes()">
                    <span>kg</span>
                </div>
            </div>
            <div class="meta-bloco">
                <div class="meta-titulo">📏 Minha Altura</div>
                <div class="meta-input-group">
                    <input type="number" id="altura-usuario" step="1" placeholder="170" onchange="salvarConfiguracoes()">
                    <span>cm</span>
                </div>
            </div>
        </div>

        <!-- PAINÉIS DE CÁLCULO AUTOMÁTICO -->
        <div class="paineis-saude">
            <div class="painel-box">
                <div class="meta-titulo">📊 Meu IMC Atual</div>
                <div id="painel-imc" class="painel-val">-</div>
            </div>
            <div class="painel-box">
                <div class="meta-titulo">💧 Água Diária</div>
                <div id="painel-agua" class="painel-val">-</div>
            </div>
        </div>
        <div class="paineis-saude">
            <div class="painel-box">
                <div class="meta-titulo">Próxima Aplicação</div>
                <div id="painel-proxima-aplicacao" class="painel-val">-</div>
            </div>
            <div class="painel-box">
                <div class="meta-titulo">Progresso</div>
                <div id="painel-quantidade-meta" class="painel-val">-</div>
            </div>
        </div>
    </div>

    <div class="grafico-container" id="containerGrafico"></div>

    <form id="form-registro">
        <input type="hidden" id="edit-index" value="-1">

        <div class="linha-dupla">
            <div class="campo">
                <label for="data">Data:</label>
                <input type="text" id="data" placeholder="DD/MM/AAAA" maxlength="10" required>
            </div>
            
            <div class="campo">
                <label for="peso">Peso Atual (kg):</label>
                <input type="number" id="peso" step="0.1" placeholder="Ex: 82.5" required>
            </div>
        </div>

        <div class="campo">
            <label for="dose">Dose Utilizada:</label>
            <select id="dose" required>
                <option value="2.5 mg">2.5 mg</option>
                <option value="5 mg">5 mg</option>
                <option value="7.5 mg">7.5 mg</option>
                <option value="10 mg">10 mg</option>
            </select>
        </div>

        <div class="campo">
            <label for="frequencia">Frequência:</label>
            <select id="frequencia" required>
                <option value="7">7</option>
                <option value="15">15</option>
                <option value="30">30</option>
            </select>
        </div>

        <div class="campo">
            <label for="local">Local da Aplicação:</label>
            <select id="local" required>
                <option value="Abdômen Esquerdo">Abdômen Esquerdo</option>
                <option value="Abdômen Direito">Abdômen Direito</option>
                <option value="Coxa Esquerda">Coxa Esquerda</option>
                <option value="Coxa Direita">Coxa Direita</option>
                <option value="Braço Direito">Braço Direito</option>
                <option value="Braço Esquerdo">Braço Esquerdo</option>
            </select>
        </div>

        <button type="submit" id="btn-submit" class="btn-salvar">Salvar Aplicação</button>
    </form>

   <!-- 
    <button onclick="exportarBackup()" class="btn-backup">💾 Baixar Backup dos Dados</button>
    <button onclick="limparTodoHistorico()" style="background-color: var(--cor-perigo); color: white;">🗑️ Limpar Todo o Histórico</button> 
    <input type="file" id="importarFile" accept=".json" onchange="importarBackupJSON(this)">
    -->

    <h2>Histórico Pessoal</h2>
    <div id="historico" class="historico-lista"></div>
</div>

<script>
    const dataInput = document.getElementById('data');
    const doseInput = document.getElementById('dose');
    const frequenciaInput = document.getElementById('frequencia');
    const form = document.getElementById('form-registro');
    const historicoDiv = document.getElementById('historico');
    const editIndexInput = document.getElementById('edit-index');
    const btnSubmit = document.getElementById('btn-submit');

    dataInput.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, ''); 
        if (v.length > 2) v = v.substring(0,2) + '/' + v.substring(2);
        if (v.length > 5) v = v.substring(0,5) + '/' + v.substring(5,9);
        e.target.value = v;
    });

    function inicializarApp() {
        carregarConfiguracoes();
        carregarHistorico();
        definirDataDeHojeUltimaDoseUltimaFrequencia();
    }

    function definirDataDeHojeUltimaDoseUltimaFrequencia() {
        // 1. Correção da Data: formato universal aceito por elementos do tipo data
        const hoje = new Date();
        const yyyy = hoje.getFullYear();
        const mm = String(hoje.getMonth() + 1).padStart(2, '0');
        const dd = String(hoje.getDate()).padStart(2, '0');
        dataInput.value = `${yyyy}-${mm}-${dd}`;

        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];
        
        // CORREÇÃO: Não filtre por peso aqui, pegue a última aplicação direto da lista geral
        if (registros.length > 0) {
            const reg = registros[registros.length - 1];
            
            doseInput.value = reg.dose || '';
            frequenciaInput.value = reg.frequencia || 7;
        }
    }

    function carregarConfiguracoes() {
        const metaSalva = localStorage.getItem('metaPesoGLP1');
        if (metaSalva) document.getElementById('meta-peso').value = metaSalva;

        const alturaSalva = localStorage.getItem('alturaGLP1');
        if (alturaSalva) document.getElementById('altura-usuario').value = alturaSalva;
    }

    function salvarConfiguracoes() {
        const valorMeta = document.getElementById('meta-peso').value;
        const valorAltura = document.getElementById('altura-usuario').value;
        
        localStorage.setItem('metaPesoGLP1', valorMeta);
        localStorage.setItem('alturaGLP1', valorAltura);
        
        calcularMetricasSaude();
        renderizarGrafico();
    }

    function calcularMetricasSaude() {
        // Busca os dados da chave correta 'dadosGLP1'
        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];
        const dadosComPeso = registros.filter(r => r.peso && String(r.peso).trim() !== '');

        const painelImc = document.getElementById('painel-imc');
        const painelAgua = document.getElementById('painel-agua');

        if (dadosComPeso.length === 0) {
            painelImc.innerText = '-';
            painelImc.style.color = 'inherit';
            painelAgua.innerText = '-';
            return;
        }

        // O primeiro item [0] é o mais recente porque usamos .unshift() ao salvar
        const pesoAtual = parseFloat(dadosComPeso[dadosComPeso.length - 1].peso);
        const alturaCm = parseFloat(document.getElementById('altura-usuario').value) || 0;

        // Cálculo da Água (35ml por kg corporal)
        const qtdAguaLitros = (pesoAtual * 35) / 1000;
        
        // CORREÇÃO: Adicionadas as crases faltantes nesta linha abaixo
        painelAgua.innerText = `${qtdAguaLitros.toFixed(1)}L / dia`;

        // Cálculo do IMC
        if (alturaCm > 0) {
            const alturaMetros = alturaCm / 100;
            const imc = pesoAtual / (alturaMetros * alturaMetros);
            let classificacao = '';
            let corText = 'inherit';
            
            if (imc < 18.5) { 
                classificacao = 'Abaixo do peso'; corText = '#e67e22'; 
            } else if (imc < 25) { 
                classificacao = 'Normal'; corText = 'var(--cor-principal, #4f46e5)'; 
            } else if (imc < 30) { 
                classificacao = 'Sobrepeso'; corText = 'var(--cor-alerta, #f59e0b)'; 
            } else { 
                classificacao = 'Obesidade'; corText = 'var(--cor-perigo, #ef4444)'; 
            }

            painelImc.innerHTML = `${imc.toFixed(1)} <br><span style="font-size:11px; color:${corText}; font-weight:normal;">${classificacao}</span>`;
        } else {
            painelImc.innerText = 'Defina a altura';
            painelImc.style.color = 'inherit';
        }
    }

    function carregarHistorico() {
        historicoDiv.innerHTML = '';
        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];
        const registrosExibicao = [...registros].reverse();

        registrosExibicao.forEach((reg, indexInvertido) => {
            const indiceReal = registros.length - 1 - indexInvertido;
            const div = document.createElement('div');
            
            // Estiliza o container do item para alinhar texto e botões horizontalmente
            div.className = 'item-aplicacao';
            div.style.display = 'flex';
            div.style.justifyContent = 'space-between';
            div.style.alignItems = 'center';
            div.style.padding = '8px 10px';
            div.style.borderBottom = '1px solid #e2e8f0';

            const exibicaoPeso = reg.peso ? `| <strong>Peso:</strong> ${reg.peso} kg` : '';
            const exibicaoFrequencia = reg.frequencia ? `<strong>Frequência:</strong> ${reg.frequencia} dias` : '7 dias';

            div.innerHTML = `
                <div style="font-size: 0.9rem; line-height: 1.4; flex-grow: 1;">
                    <strong>Data:</strong> ${reg.data} ${exibicaoPeso} <br>
                    <strong>Dose:</strong> ${reg.dose} | ${exibicaoFrequencia} <br>
                    <strong>Local:</strong> ${reg.local}
                </div>
                <div class="botoes-acoes" style="display: flex; gap: 8px; margin-left: 10px;">
                    <!-- Botões discretos apenas com o ícone, sem bordas pesadas ou fundos escuros -->
                    <button type="button" class="btn-acao btn-editar" onclick="editarRegistro(${indiceReal})" style="background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.1rem; opacity: 0.7;" title="Editar">✏️</button>
                    <button type="button" class="btn-acao btn-excluir" onclick="excluirRegistro(${indiceReal})" style="background: none; border: none; cursor: pointer; padding: 5px; font-size: 1.1rem; opacity: 0.7;" title="Excluir">🗑️</button>
                </div>
            `;
            historicoDiv.appendChild(div);
        });

        calcularMetricasSaude();
        calcularMetaPeso();
        calcularPrazoProximaDose();
        renderizarGrafico();
    }

    function converterParaDataObjeto(stringData) {
        if (!stringData) return new Date();
        const partes = stringData.split('/');
        if (partes.length !== 3) return new Date();
        const [diaStr, mesStr, anoStr] = partes;
        return new Date(parseInt(anoStr), parseInt(mesStr) - 1, parseInt(diaStr));
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const dataValor = dataInput.value;
        if (dataValor.length !== 10) {
            alert('Por favor, digite a data completa no formato DD/MM/AAAA');
            return;
        }

        const indexEdicao = parseInt(editIndexInput.value);
        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];

        const dadosAplicacao = {
            data: dataValor,
            peso: document.getElementById('peso').value,
            dose: document.getElementById('dose').value,
            local: document.getElementById('local').value,
            frequencia: document.getElementById('frequencia').value || 7
        };

        if (indexEdicao === -1) {
            registros.push(dadosAplicacao);
        } else {
            registros[indexEdicao] = dadosAplicacao;
            editIndexInput.value = "-1";
            btnSubmit.innerText = "Salvar Aplicação";
            btnSubmit.style.backgroundColor = "var(--cor-principal)";
            btnSubmit.style.color = "white";
        }

        registros.sort((a, b) => converterParaDataObjeto(a.data) - converterParaDataObjeto(b.data));
        localStorage.setItem('dadosGLP1', JSON.stringify(registros));
        
        carregarHistorico();
        form.reset();
        definirDataDeHoje();
        alert('Dados salvos com sucesso!');
    });

    function excluirRegistro(index) {
        if (confirm("Tem certeza que deseja excluir este registro?")) {
            const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];
            registros.splice(index, 1);
            localStorage.setItem('dadosGLP1', JSON.stringify(registros));
            carregarHistorico();
        }
    }

    function editarRegistro(index) {
        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];
        const reg = registros[index];

        dataInput.value = reg.data;
        document.getElementById('peso').value = reg.peso || '';
        document.getElementById('dose').value = reg.dose;
        document.getElementById('local').value = reg.local;
        document.getElementById('frequencia').value = reg.frequencia || 7;

        editIndexInput.value = index;
        btnSubmit.innerText = "Atualizar Registro Antigo ✏️";
        btnSubmit.style.backgroundColor = "var(--cor-alerta)";
        btnSubmit.style.color = "#000";
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderizarGrafico() {
        const wrapper = document.getElementById('containerGrafico');
        if (!wrapper) return;

        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];
        const meta = parseFloat(document.getElementById('meta-peso').value) || 0;
        const dadosComPeso = registros.filter(r => r.peso && String(r.peso).trim() !== '');

        if (dadosComPeso.length === 0) {
            wrapper.innerHTML = '<p style="color:#666; font-size:13px; text-align:center;">Insira a primeira aplicação para iniciar o gráfico.</p>';
            return;
        }

        const largura = 480;
        const altura = 180;
        const margem = 40;

        const listaPesos = dadosComPeso.map(r => parseFloat(r.peso));
        if (meta > 0) listaPesos.push(meta);

        const pesoMax = Math.max(...listaPesos) + 2;
        const pesoMin = Math.max(0, Math.min(...listaPesos) - 2);
        const variacaoPeso = pesoMax - pesoMin || 1;

        const totalPontos = dadosComPeso.length;
        const passoX = totalPontos > 1 ? (largura - margem * 2) / (totalPontos - 1) : largura - margem * 2;

        let coordenadasPeso = '';
        let pontosHtml = '';
        let legendasXHtml = '';

        dadosComPeso.forEach((r, idx) => {
            const cx = totalPontos > 1 ? margem + idx * passoX : largura / 2;
            const cy = altura - margem - ((parseFloat(r.peso) - pesoMin) / variacaoPeso) * (altura - margem * 2);

            coordenadasPeso += `${cx},${cy} `;
            pontosHtml += `<circle cx="${cx}" cy="${cy}" r="4" fill="#2d6a4f" />`;
            
            if (idx === 0 || idx === totalPontos - 1 || (totalPontos > 2 && idx === Math.floor(totalPontos / 2))) {
                legendasXHtml += `<text x="${cx}" y="${altura - 10}" font-size="10" fill="#666" text-anchor="middle">${r.data.substring(0,5)}</text>`;
            }
        });

        let linhaMetaHtml = '';
        if (meta > 0) {
            const metaY = altura - margem - ((meta - pesoMin) / variacaoPeso) * (altura - margem * 2);
            linhaMetaHtml = `
                <line x1="${margem}" y1="${metaY}" x2="${largura - margem}" y2="${metaY}" stroke="#d90429" stroke-width="2" stroke-dasharray="4" />
                <text x="${largura - margem + 5}" y="${metaY + 4}" font-size="10" fill="#d90429" font-weight="bold">Meta</text>
            `;
        }

        wrapper.innerHTML = `
            <svg viewBox="0 0 ${largura} ${altura}" style="width:100%; height:auto;">
                <line x1="${margem}" y1="${margem}" x2="${largura - margem}" y2="${margem}" stroke="#f0f0f0" />
                <line x1="${margem}" y1="${altura - margem}" x2="${largura - margem}" y2="${altura - margem}" stroke="#e0e0e0" />
                
                <text x="${margem - 5}" y="${margem + 4}" font-size="10" fill="#666" text-anchor="end">${pesoMax.toFixed(0)}kg</text>
                <text x="${margem - 5}" y="${altura - margem + 4}" font-size="10" fill="#666" text-anchor="end">${pesoMin.toFixed(0)}kg</text>

                ${linhaMetaHtml}

                ${totalPontos > 1 ? `<polyline points="${coordenadasPeso}" fill="none" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" />` : ''}
                ${pontosHtml}

                ${legendasXHtml}
            </svg>
        `;
    }
    function limparTodoHistorico() {
        if (confirm("ATENÇÃO: Isso apagará permanentemente todas as suas aplicações e o gráfico. Deseja continuar?")) {
            localStorage.removeItem('dadosGLP1');
            localStorage.removeItem('metaPesoGLP1');
            localStorage.removeItem('alturaGLP1');
            location.reload();
        }
    }

    function importarBackupJSON(input) {
        const arquivo = input.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        
        leitor.onload = function(evento) {
            try {
                    // Converte o texto do arquivo de volta para um objeto JavaScript
                    const dadosImportados = JSON.parse(evento.target.result);
                    
                    // Valida se o arquivo possui a estrutura correta de chaves
                    if (dadosImportados.applications && dadosImportados.bodyStats) {
                        
                        // Grava os dados importados no localStorage do navegador
                        localStorage.setItem('dadosGLP1', JSON.stringify(dadosImportados));
                        
                        // Recarrega as funções da sua tela para atualizar os dados visualmente
                        if (typeof renderAll === "function") renderAll(); 
                        if (typeof calcularMetricasSaude === "function") calcularMetricasSaude();
                        
                        alert("Backup carregado e atualizado com sucesso! 🎉");
                    } else {
                        alert("Erro: O arquivo selecionado não possui um formato de backup válido do sistema.");
                    }
                } catch (erro) {
                    alert("Erro crítico: Não foi possível ler o arquivo. Certifique-se de que é um arquivo .json válido.");
                }
        };
        
            // Inicia a leitura do arquivo como texto
            leitor.readAsText(arquivo);
            
            // Limpa o input para permitir subir o mesmo arquivo novamente se necessário
            input.value = '';
    }

    function calcularPrazoProximaDose() {
        const dadosSalvos = JSON.parse(localStorage.getItem('dadosGLP1'));
        const registrosCorporais = dadosSalvos || [];
        const painelProximaDose = document.getElementById('painel-proxima-aplicacao');
        
        // Filtra apenas registros válidos
        const dadosValidos = registrosCorporais.filter(r => r.data && String(r.data).trim() !== '');

        if (dadosValidos.length === 0) {
            painelProximaDose.innerText = "Nenhuma aplicação registrada";
            return;
        }

        // Pega o último registro inserido
        const ultimoRegistro = dadosValidos[dadosValidos.length - 1];
        const frequencia = parseInt(ultimoRegistro.frequencia) || 7;
        
        // CORREÇÃO: Divide a string "DD/MM/AAAA" para criar a data corretamente
        const partesData = ultimoRegistro.data.split('/');
        if (partesData.length !== 3) {
            painelProximaDose.innerText = "Erro na data do registro";
            return;
        }
        
        const dia = parseInt(partesData[0], 10);
        const mes = parseInt(partesData[1], 10) - 1; // Meses no JavaScript começam em 0
        const ano = parseInt(partesData[2], 10);

        // Cria os objetos de data zerando as horas para evitar erros de fuso horário
        const dataProxima = new Date(ano, mes, dia);
        dataProxima.setDate(dataProxima.getDate() + frequencia);

        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        dataProxima.setHours(0, 0, 0, 0);

        // Formata a exibição para o padrão brasileiro (apenas a data)
        const dataFormatadaBR = dataProxima.toLocaleDateString('pt-BR');
        
        // Calcula a diferença exata de dias
        const diferencaTempo = dataProxima - hoje;
        const diasRestantes = Math.round(diferencaTempo / (1000 * 60 * 60 * 24));

        // Exibe o status correspondente no painel
        if (diasRestantes > 0) {
            painelProximaDose.innerHTML = `${dataFormatadaBR} <br><span style="font-size: 11px; color: #666; font-weight: normal;">Faltam ${diasRestantes} dia(s)</span>`;
        } else if (diasRestantes === 0) {
            painelProximaDose.innerHTML = `${dataFormatadaBR} <br><span style="font-size: 11px; color: var(--cor-alerta); font-weight: bold;">É HOJE! 💉</span>`;
        } else {
            painelProximaDose.innerHTML = `${dataFormatadaBR} <br><span style="font-size: 11px; color: var(--cor-perigo); font-weight: bold;">Atrasada há ${Math.abs(diasRestantes)} dia(s) ⚠️</span>`;
        }
    }

    function calcularMetaPeso() {
        const dadosSalvos = JSON.parse(localStorage.getItem('dadosGLP1'));
        const registrosCorporais = dadosSalvos || [];
        const painelMeta = document.getElementById('meta-peso');
        const painelKgFaltante = document.getElementById('painel-quantidade-meta');

        // Obtém o valor digitado na meta de peso
        const pesoMeta = parseFloat(painelMeta.value) || 0;

        // Filtra apenas registros com peso válido
        const dadosComPeso = registrosCorporais.filter(r => r.peso && String(r.peso).trim() !== '');

        if (dadosComPeso.length === 0 || pesoMeta === 0) {
            painelMeta.innerText = "Defina o peso e a meta";
            painelMeta.style.color = 'inherit';
            return;
        }

        // Pega o peso mais atualizado lançado pelo usuário (primeiro elemento por conta do unshift)
        const pesoAtual = parseFloat(dadosComPeso[dadosComPeso.length - 1].peso);

        // Calcula os quilos que restam perder ou ganhar
        const diferencaKg = pesoAtual - pesoMeta;

        painelKgFaltante.innerHTML = `${diferencaKg} <br><span style="font-size: 11px; color: #666; font-weight: bold;">KG Faltantes</span>`;
    }

    function exportarBackup() {
        const backupTotal = {
            historico: JSON.parse(localStorage.getItem('dadosGLP1')) || [],meta: localStorage.getItem('metaPesoGLP1') || "",altura: localStorage.getItem('alturaGLP1') || ""};
            const blob = new Blob([JSON.stringify(backupTotal)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "backup_completo_glp1.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
    }
    window.addEventListener('resize', renderizarGrafico);
    inicializarApp();
</script>
