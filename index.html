<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Rastreador GLP-1</title>
    <!-- BIBLIOTECA CORRIGIDA: Versão auto-configurável que não fica em branco -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --cor-principal: #2d6a4f;
            --cor-fundo: #f4f9f4;
            --cor-card: #ffffff;
            --cor-texto: #1b4332;
            --cor-perigo: #d90429;
            --cor-alerta: #ffb703;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--cor-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h1, h2 {
            text-align: center;
            color: var(--cor-principal);
            margin-top: 10px;
        }

        .meta-container {
            background-color: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c8e6c9;
        }

        .meta-titulo {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .meta-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .meta-input-group input {
            width: 100px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            padding: 6px;
        }

        .grafico-container {
            margin-bottom: 25px;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            position: relative;
        }

        .campo {
            margin-bottom: 15px;
        }

        .linha-dupla {
            display: flex;
            gap: 15px;
        }

        .linha-dupla .campo {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-salvar {
            background-color: var(--cor-principal);
            color: white;
        }

        .btn-backup {
            background-color: #e9ecef;
            color: #495057;
        }

        .historico-lista {
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
        }

        .item-aplicacao {
            background: #f8f9fa;
            padding: 12px;
            border-left: 5px solid var(--cor-principal);
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .botoes-acoes {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        .btn-acao {
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            margin-bottom: 0;
            border-radius: 4px;
            color: white;
        }

        .btn-editar {
            background-color: var(--cor-alerta);
            color: #212529;
        }

        .btn-excluir {
            background-color: var(--cor-perigo);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💉 Registro GLP-1</h1>
    
    <div class="meta-container">
        <div class="meta-titulo">🎯 Minha Meta de Peso</div>
        <div class="meta-input-group">
            <input type="number" id="meta-peso" step="0.1" placeholder="Ex: 70.0" onchange="atualizarMetaDoGrafico()">
            <span>kg</span>
        </div>
    </div>

    <div class="grafico-container">
        <canvas id="graficoPeso"></canvas>
    </div>

    <form id="form-registro">
        <input type="hidden" id="edit-index" value="-1">

        <div class="linha-dupla">
            <div class="campo">
                <label for="data">Data:</label>
                <input type="text" id="data" placeholder="DD/MM/AAAA" maxlength="10" required>
            </div>
            
            <div class="campo">
                <label for="peso">Peso Atual (kg):</label>
                <input type="number" id="peso" step="0.1" placeholder="Ex: 82.5" required>
            </div>
        </div>

        <div class="campo">
            <label for="dose">Dose Utilizada:</label>
            <select id="dose" required>
                <option value="2.5 mg">2.5 mg</option>
                <option value="7.5 mg">7.5 mg</option>
                <option value="10 mg">10 mg</option>
            </select>
        </div>

        <div class="campo">
            <label for="local">Local da Aplicação:</label>
            <select id="local" required>
                <option value="Abdômen Esquerdo">Abdômen Esquerdo</option>
                <option value="Abdômen Direito">Abdômen Direito</option>
                <option value="Coxa Esquerda">Coxa Esquerda</option>
                <option value="Coxa Direita">Coxa Direita</option>
                <option value="Braço">Braço</option>
            </select>
        </div>

        <button type="submit" id="btn-submit" class="btn-salvar">Salvar Aplicação</button>
    </form>

    <button onclick="exportarBackup()" class="btn-backup">💾 Baixar Backup dos Dados</button>
    <button onclick="limparTodoHistorico()" style="background-color: var(--cor-perigo); color: white;">🗑️ Limpar Todo o Histórico</button>

    <h2>Histórico Pessoal</h2>
    <div id="historico" class="historico-lista"></div>
</div>

<script>
    const dataInput = document.getElementById('data');
    const form = document.getElementById('form-registro');
    const historicoDiv = document.getElementById('historico');
    const editIndexInput = document.getElementById('edit-index');
    const btnSubmit = document.getElementById('btn-submit');
    let meuGrafico = null;

    // Máscara automática de digitação (DD/MM/AAAA)
    dataInput.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, ''); 
        if (v.length > 2) v = v.substring(0,2) + '/' + v.substring(2);
        if (v.length > 5) v = v.substring(0,5) + '/' + v.substring(5,9);
        e.target.value = v;
    });

    function inicializarApp() {
        definirDataDeHoje();
        carregarMeta();
        carregarHistorico();
    }

    function definirDataDeHoje() {
        const hoje = new Date();
        const d = String(hoje.getDate()).padStart(2, '0');
        const m = String(hoje.getMonth() + 1).padStart(2, '0');
        const a = hoje.getFullYear();
        dataInput.value = `${d}/${m}/${a}`;
    }

    function carregarMeta() {
        const metaSalva = localStorage.getItem('metaPesoGLP1');
        if (metaSalva) {
            document.getElementById('meta-peso').value = metaSalva;
        }
    }

    function atualizarMetaDoGrafico() {
        const valorMeta = document.getElementById('meta-peso').value;
        localStorage.setItem('metaPesoGLP1', valorMeta);
        renderizarGrafico();
    }

    function carregarHistorico() {
        historicoDiv.innerHTML = '';
        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];
        const registrosExibicao = [...registros].reverse();

        registrosExibicao.forEach((reg, indexInvertido) => {
            const indiceReal = registros.length - 1 - indexInvertido;
            const div = document.createElement('div');
            div.className = 'item-aplicacao';
            const exibicaoPeso = reg.peso ? `| <strong>Peso:</strong> ${reg.peso} kg` : '';

            div.innerHTML = `
                <div>
                    <strong>Data:</strong> ${reg.data} ${exibicaoPeso} <br>
                    <strong>Dose:</strong> ${reg.dose} | <strong>Local:</strong> ${reg.local}
                </div>
                <div class="botoes-acoes">
                    <button type="button" class="btn-acao btn-editar" onclick="editarRegistro(${indiceReal})">✏️ Editar</button>
                    <button type="button" class="btn-acao btn-excluir" onclick="excluirRegistro(${indiceReal})">🗑️ Excluir</button>
                </div>
            `;
            historicoDiv.appendChild(div);
        });

        renderizarGrafico();
    }

    function converterParaDataObjeto(stringData) {
        if (!stringData) return new Date();
        const partes = stringData.split('/');
        if (partes.length !== 3) return new Date();
        
        const [diaStr, mesStr, anoStr] = partes;
        return new Date(parseInt(anoStr), parseInt(mesStr) - 1, parseInt(diaStr));
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const dataValor = dataInput.value;
        if (dataValor.length !== 10) {
            alert('Por favor, digite a data completa no formato DD/MM/AAAA');
            return;
        }

        const indexEdicao = parseInt(editIndexInput.value);
        const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];

        const dadosAplicacao = {
            data: dataValor,
            peso: document.getElementById('peso').value,dose: document.getElementById('dose').value,local: document.getElementById('local').value};if (indexEdicao === -1) {registros.push(dadosAplicacao);} else {registros[indexEdicao] = dadosAplicacao;editIndexInput.value = "-1";btnSubmit.innerText = "Salvar Aplicação";btnSubmit.style.backgroundColor = "var(--cor-principal)";btnSubmit.style.color = "white";}registros.sort((a, b) => converterParaDataObjeto(a.data) - converterParaDataObjeto(b.data));localStorage.setItem('dadosGLP1', JSON.stringify(registros));carregarHistorico();form.reset();definirDataDeHoje();alert('Dados salvos com sucesso!');});function excluirRegistro(index) {if (confirm("Tem certeza que deseja excluir este registro?")) {const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];registros.splice(index, 1);localStorage.setItem('dadosGLP1', JSON.stringify(registros));carregarHistorico();}}function editarRegistro(index) {const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];const reg = registros[index];dataInput.value = reg.data;document.getElementById('peso').value = reg.peso || '';document.getElementById('dose').value = reg.dose;document.getElementById('local').value = reg.local;editIndexInput.value = index;btnSubmit.innerText = "Atualizar Registro Antigo ✏️";btnSubmit.style.backgroundColor = "var(--cor-alerta)";btnSubmit.style.color = "#000";window.scrollTo({ top: 0, behavior: 'smooth' });}function renderizarGrafico() {if (typeof Chart === 'undefined') return;const registros = JSON.parse(localStorage.getItem('dadosGLP1')) || [];const meta = parseFloat(document.getElementById('meta-peso').value) || null;const registrosComPeso = registros.filter(r => r.peso && String(r.peso).trim() !== '');if (meuGrafico) {meuGrafico.destroy();meuGrafico = null;}const canvas = document.getElementById('graficoPeso');if (!canvas) return;const ctx = canvas.getContext('2d');if (registrosComPeso.length === 0) {ctx.clearRect(0, 0, canvas.width, canvas.height);return;}const labels = registrosComPeso.map(r => r.data);const dadosPeso = registrosComPeso.map(r => parseFloat(r.peso));const dadosMeta = registrosComPeso.map(() => meta);meuGrafico = new Chart(ctx, {type: 'line',data: {labels: labels,datasets: [{label: 'Peso Atual (kg)',data: dadosPeso,borderColor: '#2d6a4f',backgroundColor: 'rgba(45, 106, 79, 0.1)',tension: 0.2,fill: true},{label: 'Minha Meta',data: dadosMeta,borderColor: '#d90429',pointRadius: 0,fill: false}]},options: {responsive: true,scales: {y: {beginAtZero: false,title: { display: true, text: 'Peso (kg)' }}}}});}function limparTodoHistorico() {if (confirm("ATENÇÃO: Isso apagará permanentemente todas as suas aplicações e o gráfico. Deseja continuar?")) {localStorage.removeItem('dadosGLP1');localStorage.removeItem('metaPesoGLP1');location.reload();}}function exportarBackup() {const backupTotal = {historico: JSON.parse(localStorage.getItem('dadosGLP1')) || [],meta: localStorage.getItem('metaPesoGLP1') || ""};const blob = new Blob([JSON.stringify(backupTotal)], { type: "application/json" });const url = URL.createObjectURL(blob);const a = document.createElement('a');a.href = url;a.download = "backup_completo_glp1.json";document.body.appendChild(a);a.click();document.body.removeChild(a);}inicializarApp();
